name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: wtogsqxvyfeibnfxfbev
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy briefing-diario
        run: supabase functions deploy briefing-diario --project-ref $PROJECT_REF --no-verify-jwt

      - name: Deploy clasificar-correo
        run: supabase functions deploy clasificar-correo --project-ref $PROJECT_REF --no-verify-jwt

      - name: Deploy analisis-cotizacion
        run: supabase functions deploy analisis-cotizacion --project-ref $PROJECT_REF

      - name: Deploy analisis-contratos
        run: supabase functions deploy analisis-contratos --project-ref $PROJECT_REF
