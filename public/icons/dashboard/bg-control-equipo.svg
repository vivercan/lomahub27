<?xml version="1.0" encoding="UTF-8"?>
<!--
  Overlay estilo "dark metal premium": franjas diagonales sutiles en azul oscuro + gris plata.
  Base del card: #0A1F44 (navy profundo). Inspiración: referencia del usuario con stripes
  diagonales metálicas + halftone de puntos muy sutil. Todo a opacidades bajas (0.04-0.18)
  para que NO domine sobre el color base — solo aporta textura.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Gradient azul oscuro (banda ancha) -->
    <linearGradient id="navyBand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1E3A8A" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1E40AF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0"/>
    </linearGradient>

    <!-- Gradient gris plata (banda metálica) -->
    <linearGradient id="silverBand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#94A3B8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#CBD5E1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#94A3B8" stop-opacity="0"/>
    </linearGradient>

    <!-- Hairline plata brillante (acento) -->
    <linearGradient id="silverHair" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#E2E8F0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F1F5F9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E2E8F0" stop-opacity="0"/>
    </linearGradient>

    <!-- Halftone: patrón de puntos repetible -->
    <pattern id="halftone" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="1.1" fill="#CBD5E1" fill-opacity="0.10"/>
    </pattern>

    <!-- Sombra inferior para profundidad -->
    <linearGradient id="bottomShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.30"/>
    </linearGradient>
  </defs>

  <!-- Viñeta inferior para peso -->
  <rect width="1600" height="400" fill="url(#bottomShade)"/>

  <!-- Zona de halftone sutil (esquina superior derecha, como en la referencia) -->
  <rect x="900" y="0" width="700" height="260" fill="url(#halftone)" opacity="0.6"/>

  <!-- Banda gris plata diagonal izquierda (ancha, sutil) -->
  <polygon points="-50,-50 340,-50 80,450 -50,450" fill="url(#silverBand)" opacity="0.85"/>

  <!-- Banda azul oscuro diagonal media-izquierda -->
  <polygon points="280,-50 460,-50 200,450 20,450" fill="url(#navyBand)"/>

  <!-- Hairline plata brillante entre bandas (acento izq) -->
  <polygon points="340,-50 344,-50 82,450 78,450" fill="url(#silverHair)" opacity="0.75"/>

  <!-- Banda gris plata central (muy diluida) -->
  <polygon points="640,-50 780,-50 520,450 380,450" fill="url(#silverBand)" opacity="0.55"/>

  <!-- Banda azul oscuro central-derecha -->
  <polygon points="880,-50 1020,-50 760,450 620,450" fill="url(#navyBand)" opacity="0.70"/>

  <!-- Hairline plata brillante principal (acento central) -->
  <polygon points="1000,-50 1004,-50 742,450 738,450" fill="url(#silverHair)" opacity="0.80"/>

  <!-- Banda gris plata derecha -->
  <polygon points="1180,-50 1340,-50 1080,450 920,450" fill="url(#silverBand)" opacity="0.50"/>

  <!-- Banda azul oscuro extrema derecha -->
  <polygon points="1400,-50 1650,-50 1650,450 1140,450" fill="url(#navyBand)" opacity="0.60"/>

  <!-- Hairline top sutil (panel de control feel) -->
  <line x1="0" y1="1" x2="1600" y2="1" stroke="#CBD5E1" stroke-width="1" stroke-opacity="0.15"/>
</svg>
