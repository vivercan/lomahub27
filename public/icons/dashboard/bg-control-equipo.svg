<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Núcleo negro con glow gris muy tenue al centro -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#2E2E2E"/>
      <stop offset="45%"  stop-color="#161616"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Gradiente azul eléctrico para las bandas diagonales -->
    <linearGradient id="blueBandLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0F5CFF"/>
      <stop offset="50%"  stop-color="#0A3BE0"/>
      <stop offset="100%" stop-color="#0725A8"/>
    </linearGradient>
    <linearGradient id="blueBandRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0F5CFF"/>
      <stop offset="50%"  stop-color="#0A3BE0"/>
      <stop offset="100%" stop-color="#0725A8"/>
    </linearGradient>

    <!-- Brillo interno del azul (sutileza) -->
    <linearGradient id="blueShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3A7BFF" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#0A3BE0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Núcleo -->
  <rect width="1600" height="400" fill="url(#coreGlow)"/>

  <!-- ═══════════ BANDA IZQUIERDA ═══════════ -->
  <!-- Cuña azul grande (cubre esquina sup-izq) -->
  <polygon points="0,0 520,0 80,400 0,400" fill="url(#blueBandLeft)"/>
  <!-- Brillo interno -->
  <polygon points="0,0 520,0 80,400 0,400" fill="url(#blueShine)"/>
  <!-- Línea negra diagonal (pliegue) que divide en 2 franjas paralelas -->
  <polygon points="405,0 428,0 -8,400 -30,400" fill="#000000"/>
  <!-- Micro highlight en la franja externa -->
  <polygon points="0,0 120,0 0,110" fill="#4A8BFF" opacity="0.18"/>

  <!-- ═══════════ BANDA DERECHA ═══════════ -->
  <!-- Cuña azul grande (cubre esquina sup-der) -->
  <polygon points="1080,0 1600,0 1600,400 1520,400" fill="url(#blueBandRight)"/>
  <!-- Brillo interno -->
  <polygon points="1080,0 1600,0 1600,400 1520,400" fill="url(#blueShine)"/>
  <!-- Línea negra diagonal -->
  <polygon points="1172,0 1195,0 1630,400 1608,400" fill="#000000"/>
  <!-- Micro highlight en la franja externa -->
  <polygon points="1480,0 1600,0 1600,110" fill="#4A8BFF" opacity="0.18"/>

  <!-- Textura de brillo muy sutil en el centro negro (efecto "panel pulido") -->
  <ellipse cx="800" cy="200" rx="320" ry="80" fill="#3A3A3A" opacity="0.18"/>
  <ellipse cx="800" cy="200" rx="180" ry="40" fill="#4A4A4A" opacity="0.14"/>
</svg>
