<?xml version="1.0" encoding="UTF-8"?>
<!--
  Overlay minimalista: red delgada con pocos nodos de luz.
  Inspiración: Linear / Vercel / Attio — 5-6 puntos bien colocados,
  líneas finas, mucho espacio negativo. Se superpone al #0F172A.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="35%"  stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bigGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="25%"  stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Líneas finas: solo conexiones esenciales entre los nodos principales -->
  <g stroke="#FFFFFF" stroke-width="0.6" stroke-opacity="0.28" fill="none">
    <line x1="220" y1="120" x2="520" y2="220"/>
    <line x1="520" y1="220" x2="820" y2="110"/>
    <line x1="820" y1="110" x2="1160" y2="280"/>
    <line x1="1160" y1="280" x2="1420" y2="140"/>
    <line x1="220" y1="120" x2="820" y2="110"/>
    <line x1="520" y1="220" x2="1160" y2="280"/>
  </g>

  <!-- 5 nodos principales bien espaciados — halos grandes -->
  <circle cx="220"  cy="120" r="40" fill="url(#nodeGlow)"/>
  <circle cx="520"  cy="220" r="48" fill="url(#bigGlow)"/>
  <circle cx="820"  cy="110" r="44" fill="url(#nodeGlow)"/>
  <circle cx="1160" cy="280" r="52" fill="url(#bigGlow)"/>
  <circle cx="1420" cy="140" r="40" fill="url(#nodeGlow)"/>

  <!-- Nodos duros centrales (puntos de luz nítidos) -->
  <g fill="#FFFFFF">
    <circle cx="220"  cy="120" r="2.8"/>
    <circle cx="520"  cy="220" r="3.2"/>
    <circle cx="820"  cy="110" r="3.0"/>
    <circle cx="1160" cy="280" r="3.4"/>
    <circle cx="1420" cy="140" r="2.8"/>
  </g>

  <!-- Polvo estelar muy discreto (solo 8 puntitos dispersos) -->
  <g fill="#FFFFFF" opacity="0.35">
    <circle cx="110"  cy="300" r="0.9"/>
    <circle cx="380"  cy="60"  r="0.8"/>
    <circle cx="680"  cy="340" r="0.8"/>
    <circle cx="980"  cy="60"  r="0.9"/>
    <circle cx="1300" cy="340" r="0.8"/>
    <circle cx="1520" cy="280" r="0.8"/>
    <circle cx="60"   cy="180" r="0.7"/>
    <circle cx="1560" cy="80"  r="0.7"/>
  </g>
</svg>
