<?xml version="1.0" encoding="UTF-8"?>
<!--
  Textura premium estilo "industrial dark blue": grunge + bandas diagonales +
  mosaico pixelado a la izquierda + banda horizontal cruzando. Paleta azul oscuro
  con grises (NO negro puro). Inspirado en referencia del usuario.
  Base del card: #0A1F44 (navy profundo).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Filtro de ruido/grunge -->
    <filter id="grunge" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.10
                             0 0 0 0 0.15
                             0 0 0 0 0.28
                             0 0 0 0.25 0"/>
    </filter>

    <!-- Gradient bandas diagonales oscuras (más azul) -->
    <linearGradient id="darkBand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0A1628" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#000814" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Gradient bandas diagonales grises (plata desaturada) -->
    <linearGradient id="grayBand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#64748B" stop-opacity="0"/>
      <stop offset="50%" stop-color="#94A3B8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#64748B" stop-opacity="0"/>
    </linearGradient>

    <!-- Hairline plata brillante -->
    <linearGradient id="silverHair" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#CBD5E1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#E2E8F0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#CBD5E1" stop-opacity="0"/>
    </linearGradient>

    <!-- Banda horizontal oscura -->
    <linearGradient id="hBand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#030B1A" stop-opacity="0"/>
      <stop offset="20%" stop-color="#030B1A" stop-opacity="0.85"/>
      <stop offset="80%" stop-color="#030B1A" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#030B1A" stop-opacity="0"/>
    </linearGradient>

    <!-- Patrón de mosaico pixelado (cuadritos) -->
    <pattern id="pixelMosaic" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect x="0"  y="0"  width="14" height="14" fill="#1E293B" fill-opacity="0.55"/>
      <rect x="18" y="0"  width="14" height="14" fill="#334155" fill-opacity="0.35"/>
      <rect x="0"  y="18" width="14" height="14" fill="#0F172A" fill-opacity="0.70"/>
      <rect x="18" y="18" width="14" height="14" fill="#1E293B" fill-opacity="0.40"/>
    </pattern>

    <!-- Máscara radial para fundir el mosaico -->
    <radialGradient id="mosaicFade" cx="15%" cy="45%" r="40%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <mask id="mosaicMask">
      <rect width="1600" height="500" fill="url(#mosaicFade)"/>
    </mask>

    <!-- Sombra inferior -->
    <linearGradient id="bottomShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- 1. Grunge/noise base -->
  <rect width="1600" height="500" fill="#0A1F44" filter="url(#grunge)" opacity="0.85"/>

  <!-- 2. Mosaico pixelado a la izquierda (con máscara de desvanecido) -->
  <g mask="url(#mosaicMask)">
    <rect x="0" y="80" width="500" height="360" fill="url(#pixelMosaic)"/>
  </g>

  <!-- 3. Bandas diagonales oscuras (grandes, formando V invertida) -->
  <polygon points="-50,-50 520,-50 1100,550 700,550" fill="url(#darkBand)" opacity="0.55"/>
  <polygon points="900,-50 1400,-50 1650,550 1350,550" fill="url(#darkBand)" opacity="0.70"/>

  <!-- 4. Bandas grises sutiles en paralelo -->
  <polygon points="450,-50 580,-50 1160,550 1030,550" fill="url(#grayBand)" opacity="0.55"/>
  <polygon points="1180,-50 1260,-50 1520,550 1440,550" fill="url(#grayBand)" opacity="0.40"/>

  <!-- 5. Hairlines plateadas brillantes en los cortes -->
  <polygon points="520,-50 524,-50 1104,550 1100,550" fill="url(#silverHair)" opacity="0.70"/>
  <polygon points="1260,-50 1264,-50 1524,550 1520,550" fill="url(#silverHair)" opacity="0.55"/>

  <!-- 6. Banda horizontal oscura cruzando el centro (como en la referencia) -->
  <rect x="0" y="200" width="1600" height="90" fill="url(#hBand)"/>
  <line x1="0" y1="202" x2="1600" y2="202" stroke="#64748B" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="0" y1="288" x2="1600" y2="288" stroke="#64748B" stroke-width="1" stroke-opacity="0.20"/>

  <!-- 7. Hairline superior sutil -->
  <line x1="0" y1="1" x2="1600" y2="1" stroke="#94A3B8" stroke-width="1" stroke-opacity="0.18"/>

  <!-- 8. Viñeta inferior -->
  <rect width="1600" height="500" fill="url(#bottomShade)"/>
</svg>
