<?xml version="1.0" encoding="UTF-8"?>
<!--
  Overlay monocromo translúcido: solo blancos/negros con MUY baja opacidad.
  Pensado para superponerse al color base del card (#1E3A8A Azul comercial);
  la geometría de chevrons se nota sutilmente pero el color base manda.
  Elipse central removida (se veía como un halo raro en el medio del card).
  Negros atenuados de 0.22-0.35 → 0.10-0.16 para no oscurecer el azul marino.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" preserveAspectRatio="xMidYMid slice">
  <!-- Chevron mayor sup-izq (cara iluminada, blanco translúcido) -->
  <polygon points="-20,0 540,0 860,300 860,440 -20,440" fill="#FFFFFF" opacity="0.06"/>
  <polygon points="540,0 580,0 880,300 860,300" fill="#000000" opacity="0.16"/>
  <polygon points="860,300 1020,300 1020,620 860,440" fill="#000000" opacity="0.10"/>

  <!-- Chevron secundario sup-der (cuña brillante más corta) -->
  <polygon points="560,0 1020,0 1020,320 800,140" fill="#FFFFFF" opacity="0.05"/>
  <polygon points="560,0 600,0 820,140 800,140" fill="#000000" opacity="0.14"/>

  <!-- Chevron grande inferior apuntando abajo-izquierda -->
  <polygon points="-20,460 380,900 640,900 -20,580" fill="#FFFFFF" opacity="0.06"/>
  <polygon points="380,900 420,900 0,480 -20,480" fill="#000000" opacity="0.14"/>

  <!-- Cara oscura inferior-izquierda (atenuada) -->
  <polygon points="-20,600 -20,900 360,900" fill="#000000" opacity="0.10"/>

  <!-- Chevron inferior-derecha -->
  <polygon points="420,900 1020,900 1020,520 700,720" fill="#FFFFFF" opacity="0.05"/>
  <polygon points="420,900 460,900 720,720 700,720" fill="#000000" opacity="0.14"/>

  <!-- Grano vertical de lámina (muy sutil) -->
  <g opacity="0.04">
    <rect x="140" y="0" width="1" height="900" fill="#FFFFFF"/>
    <rect x="310" y="0" width="1" height="900" fill="#FFFFFF"/>
    <rect x="495" y="0" width="1" height="900" fill="#FFFFFF"/>
    <rect x="675" y="0" width="1" height="900" fill="#FFFFFF"/>
    <rect x="845" y="0" width="1" height="900" fill="#FFFFFF"/>
  </g>
</svg>
