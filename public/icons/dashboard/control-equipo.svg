<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="#000">
  <!-- Trailer box (caja) -->
  <path d="M 155 395 L 595 395 L 600 395 L 600 540 L 155 540 Z" />
  <!-- Small hitch detail between trailer and truck -->
  <rect x="155" y="535" width="445" height="18" />
  <!-- Truck cabin / tractor (nose) extending to the right of trailer box -->
  <path d="M 600 420 L 620 420 L 625 450 L 660 452 L 650 545 L 600 545 Z" />
  <!-- Underbelly bar extending full length of trailer -->
  <rect x="170" y="555" width="430" height="8" />
  <!-- Trailer wheels (2 big circles) -->
  <circle cx="285" cy="578" r="22" />
  <circle cx="345" cy="578" r="22" />
  <!-- Truck (tractor) rear wheel -->
  <circle cx="620" cy="578" r="14" />
  <!-- Small details on trailer front edge -->
  <rect x="148" y="395" width="10" height="145" />

  <!-- Location pin (teardrop) above GPS -->
  <path d="M 700 258
           C 700 210, 740 180, 770 180
           C 800 180, 840 210, 840 258
           C 840 310, 770 430, 770 430
           C 770 430, 700 310, 700 258 Z" />
  <!-- Inner circle hole of pin -->
  <circle cx="770" cy="258" r="32" fill="#fff" />

  <!-- GPS device (rounded rectangle screen) -->
  <rect x="580" y="500" width="340" height="200" rx="22" ry="22" />
  <!-- Screen area (darker inner) using even-odd would complicate — use inset path -->
  <rect x="598" y="520" width="304" height="150" rx="10" ry="10" fill="#fff" />

  <!-- Content inside GPS screen (road & arrow + grid lines) -->
  <!-- Road curve -->
  <path d="M 655 645 C 680 610, 690 595, 715 580 C 745 560, 740 545, 760 530" stroke="#000" stroke-width="10" fill="none" stroke-linecap="round" />
  <!-- Direction arrow (triangle) at end of road -->
  <polygon points="760,525 780,555 745,555" />
  <!-- Compass plus sign top-right of screen -->
  <rect x="842" y="528" width="14" height="4" />
  <rect x="847" y="523" width="4" height="14" />
  <!-- Horizontal map line 1 -->
  <rect x="820" y="555" width="48" height="4" />
  <!-- Horizontal map line 2 -->
  <rect x="815" y="575" width="55" height="4" />
  <!-- Horizontal map line 3 (near bottom) -->
  <rect x="620" y="630" width="45" height="4" />
  <!-- Horizontal map line 4 -->
  <rect x="680" y="645" width="60" height="4" />

  <!-- Button below screen -->
  <rect x="690" y="680" width="120" height="8" rx="4" ry="4" />
</svg>
